openapi: 3.0.3
info:
  contact:
    name: Netcracker Opensource Group
    email: opensourcegroup@netcracker.com
  license:
    name: Apache-2.0
    url: https://www.apache.org/licenses/LICENSE-2.0
  title: Api Documentation
  description: Api Documentation
  version: '1.0'
servers:
  - url: 'http://localhost:8080'
    description: Inferred Url
tags:
  - name: documentation-controller
    description: Documentation Controller
paths:
  '/atp-itf-lite/api/v1/documentation/folder':
    post:
      tags:
        - documentation-controller
      summary: getFolderRequestsTree
      operationId: getFolderRequestsTree
      parameters:
        - name: page
          in: query
          required: true
          style: form
          schema:
            type: integer
            format: int32
        - name: pageSize
          in: query
          required: true
          style: form
          schema:
            type: integer
            format: int32
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'models-v1.yaml#/definitions/FolderTreeSearchRequest'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: 'models-v1.yaml#/definitions/FolderTreeSearchRequest'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '/atp-itf-lite/api/v1/documentation/request/{requestId}':
    get:
      tags:
        - documentation-controller
      summary: getRequest
      operationId: getRequest
      parameters:
        - name: requestId
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                $ref: 'models-v1.yaml#/definitions/RequestDocumentation'
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
  '/atp-itf-lite/api/v1/documentation/edit/{id}':
    patch:
      tags:
        - documentation-controller
      summary: editDocumentation
      operationId: editDocumentation
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      requestBody:
        content:
          application/json:
            schema:
              $ref: 'models-v1.yaml#/definitions/RequestEntityEditDocumentation'
      responses:
        '200':
          description: OK
          content:
            application/json:
              schema:
                type: object
        '401':
          description: Unauthorized
        '403':
          description: Forbidden
        '404':
          description: Not Found
